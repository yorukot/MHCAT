      member_access: 無法訪問成員資訊
      bot_access: 無法訪問機器人資訊
      role_hierarchy: 你無法管理高於或等於你最高角色的角色
      bot_role_hierarchy: 機器人無法管理高於或等於其最高角色的角色
      cross_guild: 你只能管理此伺服器中訊息的反應角色
      channel_access: 你沒有訪問目標頻道的權限
