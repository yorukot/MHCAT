slashcmd:  #slash command
  locales:
    name: 選擇語言
    description: 設置你的偏好語言
    options:
      language:
        name: 語言
        description: 要更改的語言
    error:
      error_database_operate: 更新數據庫時發生未知錯誤
    successful:
      successful_update_data: 成功更新你的語言為 %s!
  reaction_role:
